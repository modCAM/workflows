name: Check Python formatting

on: pull_request

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.21"
          enable-cache: true
          python-version: "3.9"

      - name: Check formatting
        run: uvx ruff format --diff tests/ tools/
